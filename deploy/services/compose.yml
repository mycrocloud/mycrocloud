name: mycrocloud
include:
  - ./monitoring/compose.yml
  - ./webapp/compose.yml
services:
  db:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: mycrocloud
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      logging.service: db
      logging.component: infrastructure
    restart: unless-stopped
  lb:
    image: nginx:mainline-alpine3.18-perl
    ports:
      - "443:443"
    environment:
      - CONTROL_PLANE_DOMAIN=${CONTROL_PLANE_DOMAIN:-mycrocloud.online}
      - DATA_PLANE_DOMAIN=${DATA_PLANE_DOMAIN:-mycrocloud.site}
    volumes:
      - ./lb/templates/conf.d:/etc/nginx/templates:ro
      - ./lb/certs:/etc/nginx/certs:ro
      - ./lb/includes:/etc/nginx/includes:ro
      - ./lb/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
      - webapp-gateway
    labels:
      logging.service: lb
      logging.component: infrastructure
    restart: unless-stopped
  api:
    image: ghcr.io/mycrocloud/mycrocloud-api:main
    volumes:
      - "./api/appsettings.json:/app/appsettings.json:ro"
      - "./api/gha-mycrocloud.private-key.pem:/app/gha-mycrocloud.private-key.pem:ro"
    labels:
      logging.service: api
      logging.component: control-plane
    restart: unless-stopped
  db-migrator:
    image: ghcr.io/mycrocloud/mycrocloud-db-migrator:main
    volumes:
      - "./db-migrator/appsettings.json:/db-migrator/appsettings.json:ro"
    labels:
      logging.service: db-migrator
      logging.component: control-plane
    restart: "no"
  web:
    image: ghcr.io/mycrocloud/mycrocloud-web:main
    volumes:
      - ./web/dotenv:/usr/share/nginx/html/.env:ro
    labels:
      logging.service: web
      logging.component: control-plane
    restart: unless-stopped

volumes:
  db_data:
