---
- name: Fetch secrets
  hosts: localhost
  gather_facts: no
  vars:
    pull_only: false
    service_group: ""
    services: []
    secret_name_prefix: "prod/mycrocloud"
    service_groups:
      core:
        - lb
        - api
        - web
        - db-migrator
      webapp:
        - webapp-gateway
        - webapp-spa-build-worker
      monitoring:
        - alloy
        - prometheus
        - node-exporter
    all_services:
      - lb
      - api
      - web
      - db-migrator
      - webapp-gateway
      - webapp-spa-build-worker
      - alloy
      - prometheus
      - node-exporter
    services_input: "{{ (services | from_yaml) if (services is string and services | trim | length > 0) else (services | default([])) }}"
    selected_services: "{{ [services_input] if services_input is string else (services_input | default([])) }}"
    resolved_services: "{{ selected_services if selected_services | length > 0 else (service_groups[service_group] | default([])) }}"
    secret_target_services: "{{ resolved_services if resolved_services | length > 0 else all_services }}"

    # Per-service config: templates to render + secrets they need.
    # Secret key = last path segment: {{ secrets.db_connection_string }}
    # Secret key path matches secrets.tf naming: <service>/<secret_name>
    # All service secrets are available to all of that service's templates.
    services_config:
      lb:
        templates:
          - "lb/certs/mycrocloud.online.key.j2"
          - "lb/certs/mycrocloud.site.key.j2"
        secrets:
          - "lb/mycrocloud_online_key"
          - "lb/mycrocloud_site_key"
      api:
        templates:
          - "api/appsettings.json.j2"
          - "api/gha-mycrocloud.private-key.pem.j2"
        secrets:
          - "api/db_connection_string"
          - "api/db_pubsub_connection_string"
          - "api/github_webhook_secret"
          - "api/slack_client_secret"
          - "api/slack_signing_secret"
          - "api/slack_link_secret"
          - "api/s3_access_key"
          - "api/s3_secret_key"
          - "api/gha_mycrocloud_private_key"
      web:
        templates: []
        secrets: []
      db-migrator:
        templates:
          - "db-migrator/appsettings.json.j2"
        secrets:
          - "db-migrator/db_connection_string"
      webapp-gateway:
        templates:
          - "webapp/gateway/appsettings.json.j2"
        secrets:
          - "webapp-gateway/db_connection_string"
          - "webapp-gateway/s3_access_key"
          - "webapp-gateway/s3_secret_key"
      webapp-spa-build-worker:
        templates:
          - "webapp/spa/build-worker/.conf.j2"
        secrets:
          - "webapp-spa-build-worker/database_url"
          - "webapp-spa-build-worker/auth0_secret"
      alloy:
        templates:
          - "monitoring/alloy/config.alloy.j2"
        secrets:
          - "alloy/grafana_cloud_api_key"
      prometheus:
        templates:
          - "monitoring/prometheus/prometheus.yml.j2"
        secrets:
          - "prometheus/grafana_api_key"
      node-exporter:
        templates: []
        secrets: []

  tasks:
    - name: Resolve template files for target services
      when: not (pull_only | bool)
      set_fact:
        j2_template_files: >-
          {{ secret_target_services | map('extract', services_config) | map(attribute='templates') | flatten | unique }}

    - name: Fetch secrets from AWS Secrets Manager
      when: not (pull_only | bool)
      vars:
        secret_value: "{{ lookup('amazon.aws.aws_secret', secret_name_prefix + '/' + item) }}"
      set_fact:
        fetched_secrets: "{{ fetched_secrets | default({}) | combine({item: secret_value}) }}"
      loop: "{{ secret_target_services | map('extract', services_config) | map(attribute='secrets') | flatten | unique }}"
      loop_control:
        label: "{{ item }}"
      no_log: true

    - name: Build per-template secrets dicts
      when: not (pull_only | bool)
      vars:
        service_secrets: >-
          {{ dict(
            services_config[item].secrets | map('split', '/') | map('last')
            | zip(services_config[item].secrets | map('extract', fetched_secrets))
          ) }}
      set_fact:
        j2_template_secrets: >-
          {{ j2_template_secrets | default({}) | combine(
            dict(services_config[item].templates | product([service_secrets]) | list)
          ) }}
      loop: "{{ secret_target_services }}"
      no_log: true

- name: Deploy
  hosts: all
  become: no
  vars:
    src: ../services
    deploy_path: /opt/mycrocloud
    pull_only: false
    image: ""
    service_group: ""
    services: []
    server_user: "{{ ansible_user }}"
    service_groups:
      core:
        - lb
        - api
        - web
        - db-migrator
      webapp:
        - webapp-gateway
        - webapp-spa-build-worker
      monitoring:
        - alloy
        - prometheus
        - node-exporter
    # Most rendered configs stay private (0600). Prometheus config must be
    # world-readable so the prometheus process inside the container can read it.
    template_file_modes:
      monitoring/prometheus/prometheus.yml.j2: "0644"
    services_input: "{{ (services | from_yaml) if (services is string and services | trim | length > 0) else (services | default([])) }}"
    selected_services: "{{ [services_input] if services_input is string else (services_input | default([])) }}"
    resolved_services: "{{ selected_services if selected_services | length > 0 else (service_groups[service_group] | default([])) }}"
  tasks:
    - name: Pull Docker image
      ansible.builtin.command:
        cmd: docker pull {{ image }}
      when: image | length > 0

    - name: Ensure deploy directory exists
      when: not (pull_only | bool)
      ansible.builtin.file:
        path: "{{ deploy_path }}"
        state: directory
        mode: "0755"
        owner: "{{ server_user }}"
        group: "{{ server_user }}"
      become: yes

    - name: Sync application files to server
      when: not (pull_only | bool)
      ansible.builtin.synchronize:
        src: "{{ src }}/"
        dest: "{{ deploy_path }}"
        recursive: yes
        delete: "{{ resolved_services | length == 0 }}"

    - name: Copy web env file
      when: not (pull_only | bool)
      ansible.builtin.copy:
        src: "{{ deploy_path }}/web/dotenv"
        dest: "{{ deploy_path }}/web/.env"
        remote_src: yes
        mode: "0644"
        owner: "{{ server_user }}"
        group: "{{ server_user }}"

    - name: Render J2 config templates
      when: not (pull_only | bool)
      ansible.builtin.template:
        src: "{{ src }}/{{ item }}"
        dest: "{{ deploy_path }}/{{ item | regex_replace('\\.j2$', '') }}"
        mode: "{{ template_file_modes[item] | default('0600') }}"
        owner: "{{ server_user }}"
        group: "{{ server_user }}"
      loop: "{{ hostvars['localhost']['j2_template_files'] }}"
      vars:
        secrets: "{{ hostvars['localhost']['j2_template_secrets'][item] }}"
      no_log: true

    - name: Pull and deploy services
      when: not (pull_only | bool)
      community.docker.docker_compose_v2:
        project_src: "{{ deploy_path }}"
        services: "{{ resolved_services if resolved_services | length > 0 else omit }}"
        state: present
        pull: always
        remove_orphans: true
      register: deploy_result

    - name: Wait for services to be healthy
      when: not (pull_only | bool)
      ansible.builtin.shell:
        cmd: |
          services_list="{{ resolved_services | join(' ') }}"
          for service in $(docker compose ps --format '{{ '{{' }}.Service{{ '}}' }}'); do
            if [ -z "$services_list" ] || echo "$services_list" | grep -q "$service"; then
              status=$(docker compose ps $service --format '{{ '{{' }}.Health{{ '}}' }}')
              if [ "$status" != "healthy" ] && [ "$status" != "" ]; then
                echo "Service $service is $status"
                exit 1
              fi
            fi
          done
        chdir: "{{ deploy_path }}"
      register: health_check
      retries: 5
      delay: 5
      until: health_check.rc == 0

    - name: Reload nginx if dependencies require it
      ansible.builtin.command:
        cmd: docker compose exec lb nginx -s reload
        chdir: "{{ deploy_path }}"
      when:
        - not (pull_only | bool)
        - (resolved_services | length == 0 or resolved_services | intersect(['api', 'webapp-gateway', 'web']) | length > 0)
        - deploy_result.changed | default(false)
