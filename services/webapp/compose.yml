services:
  gateway:
    image: mycrocloud-gateway
    build:
      context: ./gateway
    volumes:
      - ./gateway/appsettings.json:/app/appsettings.json:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/function-data:/tmp/function-data
    ports:
      - "8081:8080"

  function-invoker:
    image: mycrocloud-function-invoker
    build:
      context: ./api/functioninvoker
    volumes:
      - ./api/functioninvoker/data:/app/data
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
          pids: 100
    profiles:
      - function-invoker
