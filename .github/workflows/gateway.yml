name: CI/CD Gateway

on:
  push:
    branches:
      - main
    paths:
      - "services/webapp/gateway/**"

  workflow_dispatch:

jobs:
  build-and-deploy:
    uses: ./.github/workflows/_build-deploy.yml
    permissions:
      id-token: write
      contents: read
      packages: write
    with:
      image-name: ${{ github.repository }}-gateway
      work-dir: services/webapp/gateway
      dockerfile: Dockerfile
      service: webapp-gateway
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
