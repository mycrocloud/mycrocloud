version: 2
updates:
  - package-ecosystem: "nuget"
    directories:
      - "services/api/Api"
      - "services/api/Api.Domain"
      - "services/api/Api.Infrastructure"
      - "services/api/Api.Migrations"
      - "services/api/Api.MigrationTest"
      - "services/webapp/gateway"
      - "services/webapp/api/functioninvoker"
    schedule:
      interval: "daily"

  - package-ecosystem: "npm"
    directories:
      - "services/web"
    schedule:
      interval: "daily"

  - package-ecosystem: "gomod"
    directories:
      - "services/webapp/spa/worker"
    schedule:
      interval: "daily"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
